name: Release

on:
  workflow_call:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - name: Build & package binaries
        run: |
          mkdir -p dist
          for triple in linux-x64 linux-arm64 darwin-x64 darwin-arm64; do
            bun build --compile --target=bun-${triple} ./src/index.ts --outfile dist/resident
            tar -czf dist/resident-${triple}.tar.gz -C dist resident
            rm dist/resident
          done

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          files: dist/resident-*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Homebrew formula
        env:
          TAP_GITHUB_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
          VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          version_num="${VERSION#v}"

          sha_linux_x64=$(sha256sum dist/resident-linux-x64.tar.gz | awk '{print $1}')
          sha_linux_arm64=$(sha256sum dist/resident-linux-arm64.tar.gz | awk '{print $1}')
          sha_darwin_x64=$(sha256sum dist/resident-darwin-x64.tar.gz | awk '{print $1}')
          sha_darwin_arm64=$(sha256sum dist/resident-darwin-arm64.tar.gz | awk '{print $1}')

          git clone "https://x-access-token:${TAP_GITHUB_TOKEN}@github.com/mickamy/homebrew-tap.git" tap
          mkdir -p tap/Formula

          cat > tap/Formula/resident.rb <<EOF
          class Resident < Formula
            desc "Slack-resident Claude bot for alert triage and @mention Q&A"
            homepage "https://github.com/mickamy/resident"
            version "${version_num}"
            license "MIT"

            on_macos do
              on_arm do
                url "https://github.com/mickamy/resident/releases/download/${VERSION}/resident-darwin-arm64.tar.gz"
                sha256 "${sha_darwin_arm64}"
              end
              on_intel do
                url "https://github.com/mickamy/resident/releases/download/${VERSION}/resident-darwin-x64.tar.gz"
                sha256 "${sha_darwin_x64}"
              end
            end

            on_linux do
              on_arm do
                url "https://github.com/mickamy/resident/releases/download/${VERSION}/resident-linux-arm64.tar.gz"
                sha256 "${sha_linux_arm64}"
              end
              on_intel do
                url "https://github.com/mickamy/resident/releases/download/${VERSION}/resident-linux-x64.tar.gz"
                sha256 "${sha_linux_x64}"
              end
            end

            def install
              bin.install "resident"
            end

            test do
              system bin/"resident", "--help"
            end
          end
          EOF

          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/resident.rb
          git commit -m "resident ${version_num}"
          git push
